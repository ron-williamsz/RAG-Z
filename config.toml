[chunking]
chunk_size = 512
chunk_overlap = 50
separators = ["\n\n", "\n", ". ", " ", ""]

[retrieval]
# Mais documentos = mais contexto para respostas elaboradas
top_k = 8
score_threshold = 0.7

[llm.openai]
model = "gpt-4o"
# Temperatura mais alta para respostas mais naturais e elaboradas
temperature = 0.3
# Mais tokens para respostas completas
max_tokens = 4096

[llm.anthropic]
model = "claude-sonnet-4-20250514"
temperature = 0.3
max_tokens = 4096

[embeddings]
# Provedores disponíveis: "openai", "ollama"
provider = "ollama"
model = "nomic-embed-text"
# Ollama base URL - use host.docker.internal quando rodar no Docker
# Para uso local (sem Docker), use http://localhost:11434
base_url = "http://host.docker.internal:11434"

# Configuração alternativa para OpenAI (comente as linhas acima e descomente abaixo)
# provider = "openai"
# model = "text-embedding-3-small"

[paths]
documents_dir = "data/documents"
faiss_index_dir = "data/faiss_index"

# Configuração do prompt do sistema (personalizável)
[prompt]
system_context = "documentos de condomínio, regulamentos, convenções e assuntos relacionados"

# Personalidade/identidade da marca — aparece em TODAS as respostas do assistente.
# Edite este texto para ajustar o tom, a identidade e as regras de como o assistente fala.
# O placeholder {context_name} sera substituido pelo nome do condominio/contexto atual.
brand_personality = """
IDENTIDADE:
- Voce NAO e um assistente externo: voce E A ZANGARI.
- Fale sempre na primeira pessoa do plural: "nos", "conosco", "nossa equipe".
- NUNCA diga "entre em contato com a Zangari" — diga "entre em contato conosco".
- NUNCA trate a Zangari como terceiro ("eles", "ela", "a empresa") — voce E a Zangari.

CONTEXTO DO CONDOMINIO:
- Quando a pergunta mencionar "o condominio", "o predio" ou "o edificio",
  entenda que se refere ao condominio atual: {context_name}.
- Ao responder, personalize citando o nome do condominio quando fizer sentido.

TOM DE VOZ:
- Prestativo, claro e proximo — como quem atende um morador ou sindico.
"""

# === HIERARQUIA LEGAL PARA CONSULTAS CONDOMINIAIS ===
# Contextos que devem ser consultados na ordem de hierarquia legal
# 1º codigo_civil - Código Civil (Lei 10.406/2002) - Norma suprema
# 2º lei_condominios - Lei de Condomínios (Lei 4.591/64)
# 3º cond_xxxx - Documentos específicos do condomínio (Convenção, Regimento, Atas)
[legal_hierarchy]
# Contextos de legislação (indexar estes documentos nos contextos abaixo)
codigo_civil_context = "codigo_civil"
lei_condominios_context = "lei_condominios"
# Chunks a recuperar de cada contexto hierárquico
top_k_per_context = 3

# Configuração de verificação de documentos
[verification]
# Tempo de vida da sessão em segundos (padrão: 24 horas = 86400 segundos)
session_ttl = 86400
# Máximo de entidades a extrair por documento
max_entities = 500
# Strictness padrão para matching (0.5-1.0)
default_strictness = 0.7
# Temperatura do LLM para extração (0.0 = determinístico)
extraction_temperature = 0.0
# Temperatura do LLM para matching (0.0 = determinístico)
matching_temperature = 0.0

# === OTIMIZAÇÕES DE MATCHING (Etapa 2) ===
# Threshold para aceitar automaticamente como match semântico (sem LLM)
# Valores mais altos = mais conservador, menos matches automáticos
high_confidence_threshold = 0.95
# Threshold mínimo para considerar candidato para validação LLM
# Valores mais baixos = mais candidatos analisados, maior recall
llm_candidate_threshold = 0.70
# Número máximo de pares por chamada batch ao LLM
# Valores maiores = menos chamadas, mas respostas mais longas
llm_batch_size = 10

# ═══════════════════════════════════════════════════════════════
# GOVERNANÇA - Hierarquia de Documentos + Perfis + Conversas
# ═══════════════════════════════════════════════════════════════

[governance]
# Hierarquia de documentos (ordem de precedência legal)
# 1º = Maior autoridade, último = menor autoridade
document_hierarchy = [
    "codigo_civil",
    "lei_condominios",
    "convencao",
    "regimento_interno",
    "ata_assembleia",
    "avisos"
]

# Hierarquia para usuários PÚBLICOS (site Zangari, visitantes)
# Prioriza conteúdo institucional, FAQ e legislação geral
document_hierarchy_global = [
    "zangari_website",
    "zangari_faq",
    "codigo_civil",
    "lei_condominios"
]

# Hierarquia para usuários de CONDOMÍNIO (autenticados)
# Prioriza documentos específicos do condomínio
document_hierarchy_condominio = [
    "convencao",
    "regimento_interno",
    "lei_condominios",
    "codigo_civil",
    "ata_assembleia",
    "avisos"
]

# Regras de resposta quando não encontra informação
[governance.rules]
not_found_message = "Não encontrei informações sobre este assunto nos documentos disponíveis."
hierarchy_not_found_message = "Não encontrei na {requested_level}. {fallback_message}"
# Se deve mostrar fontes de outros níveis quando não encontra no pedido
include_fallback_sources = true
# Se deve avisar quando usa fonte de outro nível hierárquico
include_fallback_notice = true

# Perfis de acesso
[governance.profiles.anonymous]
contexts = ["*"]  # "*" = acesso a todos os contextos públicos
max_sources = 3
response_template = "short"
can_access_private = false

[governance.profiles.authenticated]
contexts = ["*"]
max_sources = 8
response_template = "detailed"
can_access_private = false

[governance.profiles.admin]
contexts = ["*"]
max_sources = 20
response_template = "full"
can_access_private = true

# Mapeamento de contextos (público/privado)
# Formato: "contexto_solicitado" = "contexto_real"
[governance.context_mapping]
# Exemplo: cond_391_public = "cond_391_docs_publicos"
# Exemplo: cond_391_private = "cond_391_completo"

# Configuração de histórico de conversa (integração com chatbot_new)
[governance.conversation]
enable_history = true
max_history_messages = 10
# URL da API do chatbot para buscar histórico (deixe vazio para desabilitar)
# Formato esperado: GET {fetch_from_api}/{conversation_id}/messages
fetch_from_api = ""
# fetch_from_api = "http://192.168.0.76:8011/api/conversations"
